<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <rect width="480" height="120" fill="#0a0a10" rx="14"/>

  <!-- Diamond icon -->
  <polygon points="36,60 56,40 76,60 56,80"
    fill="none" stroke="#f5a623" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="56" cy="60" r="5" fill="#f5a623"/>

  <!-- Divider -->
  <line x1="96" y1="30" x2="96" y2="90"
    stroke="#f5a623" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- Wordmark -->
  <text x="112" y="72"
    font-family="Syne, system-ui, sans-serif"
    font-weight="800"
    font-size="38"
    letter-spacing="-1.5"
    fill="#f2f2f5">RealPicks<tspan fill="#f5a623">Only</tspan></text>

  <!-- Tagline -->
  <text x="114" y="90"
    font-family="Syne, system-ui, sans-serif"
    font-weight="500"
    font-size="10"
    letter-spacing="3"
